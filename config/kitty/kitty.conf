# Font Configuration
font_family FantasqueSansM Nerd Font Mono
font_size 14.0

# Chinese/CJK only uses CJK font, arrows and special chars stay with Nerd Font
symbol_map U+3000-U+303F,U+3100-U+312F,U+31A0-U+31BF,U+31C0-U+31EF,U+3200-U+32FF,U+3300-U+33FF,U+3400-U+4DBF,U+4E00-U+9FFF,U+F900-U+FAFF,U+FE30-U+FE4F,U+FF00-U+FFEF Noto Sans Mono CJK SC
symbol_map U+E867 Font Awesome 7 Brands

# Window Configuration
window_padding_width 12
background_opacity 0.9
background_blur 16
hide_window_decorations yes

# Cursor Configuration
cursor_shape block
cursor_blink_interval 1

# Scrollback
scrollback_lines 3000

# Terminal features
copy_on_select yes
strip_trailing_spaces smart

# Key bindings for common actions
map ctrl+shift+n new_window
map ctrl+t new_tab
map ctrl+plus change_font_size all +1.0
map ctrl+minus change_font_size all -1.0
map ctrl+0 change_font_size all 0

# Tab configuration
tab_bar_style powerline
tab_bar_align left

# Shell integration
shell_integration enabled

# Dank color generation
include dank-tabs.conf
include dank-theme.conf
